<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Nine Notes</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="hero">
      <div class="hero-bg"></div>

      <div class="counter">
        <div class="counter-1 digit"></div>
        <div class="counter-2 digit"></div>
        <div class="counter-3 digit"></div>
      </div>

      <div class="images-container">
        <div class="img"><img src="/assets/ariana grande.jpg" alt="Arianna Grande" /></div>
        <div class="img"><img src="/assets/Don Toliver.jpg" alt="Don Toliver" /></div>
        <div class="img"><img src="/assets/Drake.jpg" alt="Drake" /></div>
        <div class="img"><img src="/assets/Lana Del Rey.jpg" alt="Lana Del Rey" /></div>
        <div class="img"><img src="/assets/Sabrina Carpenter.jpg" alt="Sabrina Carpenter" /></div>
        <div class="img"><img src="/assets/Travis Scott.jpg" alt="Travis Scott" /></div>
        <div class="img"><img src="/assets/Weeknd.jpg" alt="The Weeknd" /></div>
        <div class="img"><img src="/assets/kendrick lamar.jpg" alt="Kendrick Lamar" /></div>
        <div class="img"><img src="/assets/playboy carti.jpg" alt="Playboi Carti" /></div>
        <div class="img"><img src="/assets/ariana grande.jpg" alt="Arianna Grande" /></div>
        <div class="img"><img src="/assets/Don Toliver.jpg" alt="Don Toliver" /></div>
        <div class="img"><img src="/assets/Drake.jpg" alt="Drake" /></div>
        <div class="img"><img src="/assets/Lana Del Rey.jpg" alt="Lana Del Rey" /></div>
        <div class="img"><img src="/assets/Sabrina Carpenter.jpg" alt="Sabrina Carpenter" /></div>
        <div class="img"><img src="/assets/Travis Scott.jpg" alt="Travis Scott" /></div>
      </div>

      <nav>
        <div class="logo-name" style="display: flex; align-items: baseline; gap: 1.5rem;">
          <a href="#">The Nine Notes</a>
        </div>

        <div class="nav-right" style="display: flex; gap: 2rem; text-transform: uppercase; letter-spacing: 0.1rem; font-size: 0.8rem; opacity: 0.7;">
          <a href="#">Y7XIFIED</a>
        </div>

        <div class="divider"></div>
      </nav>

      <div class="sidebar">
        <div class="logo">
          <span class="logo-nine">9</span>
        </div>

        <div class="divider"></div>
      </div>

      <div class="active-singer-poster">
        <img id="active-image" src="/assets/ariana grande.jpg" alt="Active Singer" />
      </div>

      <div class="header">
        <h1 id="active-name">Ariana Grande</h1>
      </div>

      <div class="site-info">
        <h2>Modern vocal excellence.</h2>

        <div class="divider"></div>

        <div class="site-info-copy" id="active-desc">
          <p>Multi-octave generational vocalist.</p>
        </div>
      </div>

      <div class="signature">
        <p>ALL RIGHTS RESERVED</p>
      </div>
    </section>

    <script type="module" src="/script.js"></script>
  </body>
</html>
